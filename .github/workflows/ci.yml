name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: black
        run: black --check src tests
      - name: isort
        run: isort --check-only src tests
      - name: flake8
        run: flake8 src tests
      - name: mypy
        run: mypy src

  test:
    runs-on: ubuntu-latest
    env:
      # pyvvisf renders through OpenGL; use Mesa's software rasterizer under xvfb.
      LIBGL_ALWAYS_SOFTWARE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system OpenGL libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb libglfw3 libgl1-mesa-dri libosmesa6
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests (headless OpenGL via xvfb)
        run: xvfb-run -a pytest
