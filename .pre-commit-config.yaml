repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black

  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort

  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8

  # mypy runs as a local hook so it uses the project's installed dependencies
  # (and the [tool.mypy] config in pyproject.toml) rather than an isolated env.
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy src
        language: system
        types: [python]
        pass_filenames: false
